name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Update npm to latest (OIDC Trusted Publisher)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          # CHANGELOG.md 의 해당 버전 주요 업데이트 를 릴리즈 노트로 사용 (조직 공통 양식 SSOT, 한글).
          # --generate-notes 자동 PR 목록은 양식에 안 맞아 사용하지 않는다.
          NOTES=$(awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md)
          [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ] && NOTES="- 자세한 변경은 CHANGELOG.md 참고"
          BODY=$(printf '## Design System of Bigtablet, Inc.\n#### 주요 업데이트\n%s' "$NOTES")
          gh release create "$TAG" --title "$TAG" --notes "$BODY"
