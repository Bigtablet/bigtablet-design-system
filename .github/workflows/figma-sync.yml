name: Figma Color Sync

on:
  schedule:
    # 평일 오전 9시 KST (UTC+9 = UTC 00:00)
    - cron: "0 0 * * 1-5"
  workflow_dispatch: # 수동 실행 가능

jobs:
  sync:
    name: Sync Figma Color Styles
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Apply Figma color changes
        id: apply
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: node scripts/figma-apply.mjs
        continue-on-error: true

      - name: Create PR with color changes
        if: steps.apply.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="fix/figma-color-sync-$(date '+%Y-%m-%d')"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/styles/ts/colors.ts src/styles/scss/_colors.scss figma-snapshot.json
          git commit -m "fix: sync figma color styles

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin "$BRANCH"

          gh pr create \
            --base develop \
            --title "fix/figma-color-sync" \
            --body-file .figma-pr-body.md
