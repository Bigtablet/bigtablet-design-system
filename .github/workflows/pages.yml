name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/ui/**'
      - 'src/stories/**'
      - 'src/styles/**'
      - 'src/**/*.stories.tsx'
      - '.storybook/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsup.config.ts'
      - 'tsconfig.json'
      - 'scripts/protect-storybook.mjs'
      - '.github/workflows/pages.yml'
  # 수동 트리거 (브랜드 / 도메인 외부 콘텐츠 갱신 필요할 때)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build:sb

      - name: Protect Storybook
        run: node scripts/protect-storybook.mjs
        env:
          STORYBOOK_PASSWORD_HASH: ${{ secrets.STORYBOOK_PASSWORD_HASH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
